{% extends "base.html" %}
{% block title %}Edit {{ book.title }} — My Bookshelf{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <h1>Edit Book</h1>

    <form method="post" enctype="multipart/form-data" class="book-form">

      <div class="form-group required">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required value="{{ book.title }}">
      </div>

      <div class="form-group">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" value="{{ book.author }}">
      </div>

      <div class="form-group">
        <label for="genre">Genre</label>
        <input type="text" id="genre" name="genre" value="{{ book.genre }}">
      </div>

      <div class="form-group">
        <label for="pdf_path">PDF File Path</label>
        <input type="text" id="pdf_path" name="pdf_path" value="{{ book.pdf_path }}"
               placeholder="/home/user/Books/book.pdf">
        <span class="form-hint">Absolute path to the PDF on your computer.</span>
      </div>

      <div class="form-group">
        <label for="cover">Cover Image</label>
        {% if book.cover_file %}
          <div class="current-cover">
            <img src="{{ url_for('static', filename='covers/' + book.cover_file) }}"
                 alt="Current cover" class="cover-thumb">
            <span>Current cover</span>
          </div>
        {% endif %}
        <input type="file" id="cover" name="cover" accept="image/*" class="file-input">
        <span class="form-hint">Upload a new image to replace the current cover.</span>
      </div>

      <div class="form-group">
        <label for="description">Description / Notes</label>
        <textarea id="description" name="description" rows="4">{{ book.description }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Save Changes</button>
        <a href="{{ url_for('book_detail', book_id=book.id) }}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
