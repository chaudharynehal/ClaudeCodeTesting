<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Bookshelf{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="{{ url_for('index') }}" class="logo">
      <span class="logo-icon">&#128218;</span>
      <span class="logo-text">My Bookshelf</span>
    </a>
    <nav class="site-nav">
      <a href="{{ url_for('index') }}">Library</a>
      <a href="{{ url_for('add_book') }}" class="btn-nav">+ Add Book</a>
    </nav>
  </div>
</header>

<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
</div>

<main class="site-main">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <p>Your personal library &mdash; keep reading.</p>
</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
